<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBDKE20FATIIMM 💕</title>    
    <!-- Menambahkan link font Quicksand agar terbaca di canvas -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style> 
        :root {
            /* Palet Warna Pink */
            --bg-dark-pink: #2a0a18;
            --bg-center-pink: #541233;
            --hot-pink: #ff69b4;
            --deep-pink: #ff1493;
            --light-pink: #ffb6c1;
            --soft-pink: #ffe4e6;
        }

        body {      
            margin: 0;     
            padding: 0; 
            background-color: var(--bg-dark-pink); /* Latar belakang pink gelap */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Menghindari zoom otomatis saat klik cepat di iOS */
            touch-action: manipulation;
        }
 
        /* Canvas sebagai background tetap */ 
        #canvas {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            display: none;
        }

        /* Overlay halaman */ 
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease-in-out, visibility 0.5s;
        }

        /* Khusus halaman 3 agar bisa di-scroll */
        #page-3 {
            position: absolute; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center;
            padding-bottom: 50px;
            overflow-y: auto; 
            background: rgba(42, 10, 24, 0.85); /* Overlay transparan pink gelap */
        }

        /* Custom Scrollbar Pink */
        #page-3::-webkit-scrollbar {
            width: 8px;
        }
        #page-3::-webkit-scrollbar-track {
            background: rgba(255, 182, 193, 0.1); 
        }
        #page-3::-webkit-scrollbar-thumb {
            background: var(--hot-pink); 
            border-radius: 10px;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Halaman 1: Kado */
        #page-1 {
            background: radial-gradient(circle, var(--bg-center-pink) 0%, var(--bg-dark-pink) 100%);
            z-index: 100;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 2rem;
            text-align: center;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        /* Efek Glow tulisan warna Pink */
        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 10px var(--light-pink); }
            to { transform: scale(1.05); text-shadow: 0 0 30px var(--deep-pink), 0 0 40px var(--hot-pink); } 
        }

        #gift-button {
            font-size: 100px;
            background: none;
            border: none;
            cursor: pointer;
            user-select: none;
            animation: wobble 2s infinite ease-in-out;
            transition: transform 0.3s;
            /* Glow kado jadi pink */
            filter: drop-shadow(0 0 25px rgba(255, 105, 180, 0.6)); 
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-20px); }
        }

        /* Halaman 2: Kembang Api Overlay */
        #page-2 {
            pointer-events: auto;
            background: transparent;
        }

        #next-page-btn {
            position: fixed;
            bottom: 50px;
            padding: 15px 30px;
            background: rgba(255, 105, 180, 0.15); /* Transparan pink */
            border: 2px solid var(--hot-pink);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 16px;
            font-weight: bold;
            z-index: 20;
            transition: all 0.3s;
            pointer-events: auto;
            display: none;
            -webkit-tap-highlight-color: transparent;
        }

        #next-page-btn:hover {
            background: var(--hot-pink);
            color: white;
            box-shadow: 0 0 20px var(--hot-pink);
        }

        /* --- KEMBALI KE STYLE GALERI FOTO AWAL --- */
        .photo-gallery {
            position: relative;
            width: 100%;
            max-width: 650px; 
            height: 650px; 
            margin: 20px auto 0 auto; 
            flex-shrink: 0;
        }

        .photo-item {
            position: absolute;
            width: 180px;
            padding: 10px;
            background: var(--soft-pink); /* Bingkai polaroid warna soft pink */
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2); /* Bayangan pink */
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), z-index 0.1s, opacity 0.5s, top 0.5s;
            z-index: 11;
            opacity: 0;
            top: 120%; 
            border-radius: 8px; /* Sedikit melengkung */
        }

        .photo-item.reveal { opacity: 1; }

        .photo-item:hover {
            transform: scale(1.15) rotate(0deg) !important;
            z-index: 50 !important;
            box-shadow: 0 15px 40px rgba(255, 20, 147, 0.4); /* Glow pink saat di-hover */
        }

        /* Style untuk Foto DAN Video di dalam frame */
        .photo-item img, .photo-item video {
            width: 100%;
            height: 180px; 
            object-fit: cover;
            display: block;
            border-radius: 4px;
        }

        /* POSISI FOTO/VIDEO YANG TERSEBAR */
        .photo-1.reveal { top: 5%; left: 5%; transform: rotate(-10deg); }
        .photo-2.reveal { top: 8%; right: 5%; transform: rotate(8deg); }
        .photo-3.reveal { top: 40%; left: 8%; transform: rotate(5deg); }
        .photo-4.reveal { top: 45%; right: 10%; transform: rotate(-12deg); }
        .photo-5.reveal { top: 68%; left: 50%; margin-left: -100px; transform: rotate(-3deg); }

        @media (max-width: 768px) {
            .photo-gallery { height: 550px; max-width: 100%; }
            .photo-item { width: 140px; }
            .photo-item img, .photo-item video { height: 140px; }
            
            .photo-1.reveal { top: 5%; left: 5%; transform: rotate(-8deg); }
            .photo-2.reveal { top: 8%; right: 5%; transform: rotate(6deg); }
            .photo-3.reveal { top: 38%; left: 5%; transform: rotate(4deg); }
            .photo-4.reveal { top: 42%; right: 5%; transform: rotate(-6deg); }
            .photo-5.reveal { top: 70%; left: 50%; margin-left: -80px; transform: rotate(2deg); }
        }
        /* --------------------------- */

        .message-card {
            position: relative;
            z-index: 60;
            max-width: 450px;
            width: 85%;
            background: rgba(255, 182, 193, 0.1); /* Background card soft pink transparan */
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 105, 180, 0.3); /* Border pink */
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(255, 105, 180, 0.1); 
            text-align: center;
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 50px; 
            margin-bottom: 50px; 
        }

        #typing-text {
            white-space: pre-wrap;
        }

        .message-card.reveal {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .message-card h2 { color: var(--light-pink); margin-bottom: 15px; font-size: 1.8rem; }
        .message-card p { font-size: 1.05rem; line-height: 1.6; color: #fff; }
        .restart-btn { margin-top: 25px; background: transparent; color: var(--light-pink); border: none; text-decoration: underline; cursor: pointer; font-size: 1rem; }

        /* Gaya untuk efek kursor mengetik */ 
        #typing-text::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: var(--hot-pink);
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Hint Scroll untuk HP */
        .scroll-hint {
            color: var(--light-pink);
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 10px;
            animation: bounce 2s infinite; 
            display: none;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>
    <!-- AUDIO BACKGROUND -->
    <audio id="birthday-music" loop preload="auto">
        <source src="https://birthdaysx.github.io/Musik/ada-untukmu-budi-doremi.mp3" type="audio/mpeg">     
    </audio>

    <canvas id="canvas"></canvas>       
    
    <!-- HALAMAN 1 -->  
    <div id="page-1" class="page">   
        <h1>Happy Birthday!</h1>
        <button id="gift-button" aria-label="Buka Kado">🎁</button>  
        <p style="color: #ffb6c1; margin-top: 30px; letter-spacing: 1px;">Klik kado untuk kejutan </p>
    </div>

    <!-- HALAMAN 2 (FIREWORKS) --> 
    <div id="page-2" class="page hidden">
        <div style="position: fixed; top: 20px; color: rgba(255, 182, 193, 0.8); letter-spacing: 2px; font-size: 14px; animation: pulse 1s infinite alternate; pointer-events: none;">
            ✨ Klik layar untuk Wishes ✨ 
        </div>
        <button id="next-page-btn">Lihat Kejutan Spesial </button>  
    </div> 
 
    <!-- HALAMAN 3 (GALERI FOTO & VIDEO) --> 
    <div id="page-3" class="page hidden">    
         
        <div class="photo-gallery">  
            <div class="photo-item photo-1"><img src="https://birthdaysx.github.io/Foto4/nn1.jpeg" alt="Momen 1"></div> 
            <div class="photo-item photo-2"><img src="https://birthdaysx.github.io/Foto4/nn2.jpeg" alt="Momen 2"></div>
            <div class="photo-item photo-3"><img src="https://birthdaysx.github.io/Foto4/nn3.jpeg" alt="Momen 3"></div> 
            <div class="photo-item photo-4"><img src="https://birthdaysx.github.io/Foto4/nn4.jpeg" alt="Momen 4"></div> 
            <div class="photo-item photo-5"><img src="https://birthdaysx.github.io/Foto4/nn5.jpeg" alt="Momen 5"></div> 
        </div> 

        <div id="scroll-hint" class="scroll-hint">Scroll kebawah ya fatiimm.. 👇</div>      
  
        <!-- KARTU PESAN --> 
        <div class="message-card" id="message-card">   
            <h2>Happy Birthdayy<br>fatiimm✨ </h2>          
            <p id="typing-text"></p>  
            <p style="font-style: italic; margin-top: 15px; color: #ffe4e6;">
                from sultaann<br>      
                <span style="font-size: 0.8rem; opacity: 0.8;"></span>
            </p>
            <button class="restart-btn" onclick="location.reload()">Mulai Lagi</button>  
        </div> 
    </div> 
 
    <script>
        const canvas = document.getElementById('canvas'); 
        const ctx = canvas.getContext('2d');
        const page1 = document.getElementById('page-1');
        const page2 = document.getElementById('page-2');
        const page3 = document.getElementById('page-3');
        const giftButton = document.getElementById('gift-button');
        const nextPageBtn = document.getElementById('next-page-btn');
        const messageCard = document.getElementById('message-card');
        const photoItems = document.querySelectorAll('.photo-item');
        const scrollHint = document.getElementById('scroll-hint');

        let width, height;
        let particles = [];
        let lasers = [];  
        let isStarted = false; 
        let cinematicDone = false;      
    
        // PESAN UNTUK DIKETIK  
        const messageToType = "hepiibesdeeyy fatiimm hueuehue udah kepala 2 :3 wekekekek,,,semogaaa di umur kamu yang ke 20 ini kamu dapetin apaa yang kamu mauu, apa yang kamu harapkan dan kamu rencanakan semuanya lancarr teruuss, diberikan kekuatan untuk hadepin semua haall yang adaa ke depannya nantii, ada akuu nemenin kamu di perjalanan kita yang panjang inii waktu kuliahh, terimakasii kamu udah mau temenan sama aku, baikk bangeett sama aku, aku selalu senang tentang apapun hal soal kamuu, cerita kamu, kelakuan random kamu, dan aku sukaaa bangett nyanyian kamuu, baguss, suaranya cantik kaya yang nyanyii wekekekek, kamu anak hebatt, kuatt, aku bangga sama kamu kakk, maafin aku yaa pernah bikin kamu sedih, kesel, jarang bikin senyum, moga kedepannya bisa banyak bikin senyum deh yaa aamiiinn, banyakk yang aku mau ucapin tapi gamuat disini,,,semoga lancarr kuliahnyaa, ingett ada aku nemenin kamuu, sukses teruss orang baikk, kuatt, hebatt";  
 
        // DAFTAR UCAPAN (WISHES)  
        const wishes = [["SEHAT","SELALU"],["SUKSES","TERUSS"],["IMPIANNYA","TERWUJUD"],["JADI DOKTER","KULIT"],["KULIAH","LANCARR"],["SELALU","KUATT"]];    
        let wishIndex = 0;
 
        function resize() {     
            width = canvas.width = window.innerWidth;   
            height = canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); 
        resize();

        const random = (min, max) => Math.random() * (max - min) + min; 
 
        class SharpParticle {
            constructor(x, y, color, isBig = false, targetX = null, targetY = null) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.targetX = targetX;
                this.targetY = targetY;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = isBig ? random(8, 25) : random(2, 6);
                this.velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
                
                this.friction = 0.94;
                this.gravity = (targetX !== null) ? 0 : 0.025;
                this.opacity = 1;
                this.decay = (targetX !== null) ? 0.0001 : (isBig ? random(0.0015, 0.012) : random(0.015, 0.03));
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - (this.velocity.x * 3), this.y - (this.velocity.y * 3));
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            }
            update() {
                if(this.targetX !== null) {
                    this.x += (this.targetX - this.x) * 0.1;
                    this.y += (this.targetY - this.y) * 0.1;
                    this.velocity.x *= 0.9;
                    this.velocity.y *= 0.9;
                } else {
                    this.velocity.x *= this.friction;
                    this.velocity.y *= this.friction;
                    this.velocity.y += this.gravity;
                    this.x += this.velocity.x;
                    this.y += this.velocity.y;
                }
                this.opacity -= this.decay;
            }
        }

        class Laser {
            constructor(targetX, targetY, isCinematic = false) {
                this.x = width / 2; 
                this.y = height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.isCinematic = isCinematic;
                const angle = Math.atan2(targetY - this.y, targetX - this.x);
                this.speed = isCinematic ? 0.01 : 2.5;              
                this.acceleration = isCinematic ? 1.016     : 1.1;  
                this.velocityUnit = { x: Math.cos(angle), y: Math.sin(angle) };
                
                // Menyesuaikan warna kembang api agar bernuansa Pink/Ungu/Magenta
                this.hue = isCinematic ? 330 : random(290, 350);
                this.color = isCinematic ? '#ff1493' : `hsl(${this.hue}, 100%, 70%)`;
            } 
            draw() { 
                ctx.save();
                ctx.beginPath();  
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.velocityUnit.x * this.speed * 4, this.y - this.velocityUnit.y * this.speed * 4);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.isCinematic ? 3 : 1;
                ctx.stroke();
                ctx.restore();
            }
            update() {
                this.speed *= this.acceleration;
                this.x += this.velocityUnit.x * this.speed;
                this.y += this.velocityUnit.y * this.speed;
                if (this.y <= this.targetY) {
                    this.explode(); 
                    return false;
                }
                return true;
            }
            explode() {
                if (this.isCinematic) { 
                    for (let i = 0; i < 280; i++) { 
                        particles.push(new SharpParticle(this.x, this.y, `#ff69b4`, true)); // Ledakan Hot Pink
                    }
                    setTimeout(() => createTextParticles(["Happy Birthday","fatiimm✨"], this.x, this.y, "#ffb6c1"), 1); // Tulisan Light Pink
                    cinematicDone = true;
                    setTimeout(() => { nextPageBtn.style.display = 'block'; }, 5000);            
                } else {   
                    for (let i = 0; i < 50; i++) {             
                        particles.push(new SharpParticle(this.x, this.y, this.color));
                    }
                }  
            }  
        }  

        function createTextParticles(text, centerX, centerY, color) {
            const tempCanvas = document.createElement('canvas');  
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 600;
            tempCanvas.height = 200; 
            
            tCtx.fillStyle = 'red'; 
            tCtx.font = "bold 50px 'Quicksand', sans-serif";
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';

            if (Array.isArray(text)) {
                tCtx.fillText(text[0], 300, 60);
                tCtx.fillText(text[1], 300, 120);
            } else {
                tCtx.fillText(text, 300, 100);
            }
            
            const data = tCtx.getImageData(0, 0, 600, 200).data;
            for (let y = 0; y < 200; y += 4) {
                for (let x = 0; x < 600; x += 4) {
                    if (data[(y * 600 + x) * 4 + 3] > 128) {
                        const tx = centerX + (x - 300);
                        const ty = centerY + (y - 100); 
                        particles.push(new SharpParticle(centerX, centerY, color, true, tx, ty));
                    }
                }
            }
        }

        function animate() {
            if (!isStarted) return;
            // Menyesuaikan trail canvas agar senada dengan background pink gelap
            ctx.fillStyle = 'rgba(42, 10, 24, 0.2)';
            ctx.fillRect(0, 0, width, height);

            lasers = lasers.filter(l => {
                l.draw();
                return l.update();
            });

            particles = particles.filter(p => {
                p.draw();
                p.update();
                return p.opacity > 0;
            });

            if (cinematicDone && lasers.length === 0) {
                lasers.push(new Laser(random(width * 0.1, width * 0.9), random(height * 0.1, height * 0.4)));
            }
            requestAnimationFrame(animate);
        }

        function typeWriter(text, elementId, speed) {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = ""; 
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        giftButton.addEventListener('click', () => {
            const music = document.getElementById('birthday-music');
            music.play().catch(error => console.log("Musik diblokir browser:", error));
            page1.classList.add('hidden');
            canvas.style.display = 'block';
            page2.classList.remove('hidden');
            isStarted = true;
            setTimeout(() => {
                lasers.push(new Laser(width / 2, height * 0.25, true));
                animate();
            }, 500);
        });

        window.addEventListener('pointerdown', (e) => {
            if (cinematicDone && isStarted && e.target.id !== 'next-page-btn' && e.target.tagName !== 'VIDEO') {
                const text = wishes[wishIndex];
                // Wish particles dibuat dengan warna Pink / Magenta acak
                const randomColor = `hsl(${random(300, 350)}, 100%, 75%)`;
                const clickX = e.clientX;
                const clickY = e.clientY;
                createTextParticles(text, clickX, clickY, randomColor);
                wishIndex = (wishIndex + 1) % wishes.length;
            }
        }, { passive: true });

        // LOGIKA PINDAH HALAMAN
        nextPageBtn.onclick = (e) => {
            e.stopPropagation(); 
            page2.classList.add('hidden');
            page3.classList.remove('hidden');
            document.body.style.overflowY = "auto";
            
            // Memastikan video berputar saat halaman muncul
            const myVideo = document.querySelector('video');
            if(myVideo) myVideo.play().catch(error => console.log("Video autoplay error:", error));

            // Animasi muncul Foto & Video satu per satu
            photoItems.forEach((item, i) => {
                setTimeout(() => item.classList.add('reveal'), i * 300);
            });

            setTimeout(() => {
                messageCard.classList.add('reveal');
                if(window.innerWidth < 768) scrollHint.style.display = 'block';
                
                setTimeout(() => {
                    typeWriter(messageToType, "typing-text", 50);
                }, 800);
            }, 1800);
        };
    </script>
</body>
</html>
